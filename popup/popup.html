<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Form Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">🎫</span>
    <h1>Event Form Helper</h1>
    <label class="toggle-switch" title="啟用/停用">
      <input type="checkbox" id="masterToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-title">開始時間設定</div>
    <div class="datetime-row">
      <select id="dtYear" class="dt-select dt-year"></select>
      <span class="dt-sep">/</span>
      <select id="dtMonth" class="dt-select dt-month"></select>
      <span class="dt-sep">/</span>
      <select id="dtDay" class="dt-select dt-day"></select>
    </div>
    <div class="datetime-row" style="margin-top:5px">
      <select id="dtHour" class="dt-select dt-hour"></select>
      <span class="dt-sep">:</span>
      <select id="dtMinute" class="dt-select dt-min"></select>
    </div>
    <div id="countdown" class="countdown">尚未設定時間</div>
  </div>

  <div class="section">
    <div class="section-title">項目優先清單 <span class="hint">（由上至下依序嘗試）</span></div>
    <div id="ticketList" class="ticket-list"></div>
    <div class="add-ticket-row">
      <input type="text" id="newTicketName" placeholder="項目關鍵字" class="input-field flex-grow">
      <input type="number" id="newTicketQty" placeholder="數量" min="1" max="10" value="1" class="input-qty">
      <button id="addTicketBtn" class="btn btn-add">新增</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">頻率設定</div>
    <div class="row">
      <label class="label">檢查間隔（ms）</label>
      <div class="range-wrap">
        <input type="range" id="pollInterval" min="500" max="5000" step="100" value="1500">
        <span id="pollIntervalDisplay" class="range-display">1500ms</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">表單選項</div>
    <label class="checkbox-row">
      <input type="checkbox" id="autoAgree" checked>
      <span>勾選「同意服務條款」</span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="autoNext" checked>
      <span>點擊「選位／下一步」</span>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="autoApiSubmit">
      <span>直接送出（較快）</span>
    </label>
  </div>

  <div class="footer">
    <button id="saveBtn" class="btn btn-save">儲存設定</button>
    <div id="saveStatus" class="save-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
